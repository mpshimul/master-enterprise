name: Secure Firebase-Free Invoice Saver

on:
  repository_dispatch:
    types: [save_invoice_event]

jobs:
  save_json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Data Directory
        run: mkdir -p data

      - name: Write Invoice JSON File
        run: |
          # toJson() ব্যবহার করে ক্লায়েন্ট পেলোডকে সঠিকভাবে JSON ফাইলে কনভার্ট করা হচ্ছে
          cat << 'EOF' > data/REF-${{ github.event.client_payload.refNo }}.json
          ${{ toJson(github.event.client_payload.invoiceData) }}
          EOF

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Invoice Auto-Saver"
          git config --global user.email "actions@github.com"
          git add data/
          
          # ফাইলটি নতুন নাকি আপডেট হচ্ছে তা চেক করে কমিট করা
          if git diff-index --quiet HEAD --; then
            echo "No changes detected."
          else
            git commit -m "Auto-saved Invoice Data | Ref: ${{\ { github.event.client_payload.refNo } \}}"
            git push
          fi
