    <title>মেসার্স মাস্টার এন্টারপ্রাইজ - বিজনেস প্যাড</title>

        body {
            font-family: 'Noto Sans Bengali', sans-serif;
            background-color: #f3f4f6;
            margin: 0;
            padding: 20px;
        }
        .pad-container {
            background-color: white;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            padding: 40px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            position: relative;
            box-sizing: border-box;
        }
        @media print {
            body { background-color: white !important; padding: 0 !important; }
            .pad-container { box-shadow: none !important; margin: 0 !important; border: none !important; }
            .no-print, .no-print * { display: none !important; }
            input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { display: none !important; }
            input { border: none !important; outline: none !important; background: transparent !important; color: black !important; }
            input::placeholder { color: transparent !important; }
        }
        .border-double-bottom {
            border-bottom: 4px double #1e40af;
        }
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 80px;
            color: rgba(30, 64, 175, 0.05);
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            z-index: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            z-index: 10;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 12px 8px;
            text-align: center;
        }
        th {
            background-color: #f8fafc;
            color: #1e3a8a;
            font-weight: bold;
        }
        input {
            width: 100%;
            text-align: center;
            border: 1px solid transparent;
            padding: 4px;
        }
        input:focus {
            border: 1px solid #3b82f6;
            outline: none;
            background-color: #f0f9ff;
        }
        .text-left-input {
            text-align: left;
        }
        .tagline {
            background-color: #f1f5f9;
            border-left: 4px solid #1e40af;
            padding: 5px 15px;
            font-style: italic;
            color: #1e3a8a;
            display: inline-block;
            margin-top: 10px;
            font-size: 14px;
        }
        .signature-img {
            max-width: 240px;
            max-height: 100px;
            margin-top: 5px;
        }
